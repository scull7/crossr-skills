name: Deploy CrossR Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'book/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Phase B: Marketing site only
  # Phase D will extend this job to also build mdBook and copy it into site/static/docs
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola (Rust static site generator)
        run: |
          ZOLA_VERSION="0.19.2"
          curl -L "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/
          zola --version

      - name: Build marketing site (Zola)
        run: |
          cd site
          zola build --force
          echo "Built Zola site successfully"

      - name: Upload artifact (marketing only for Phase B)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
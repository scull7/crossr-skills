name: Deploy CrossR Site

# =============================================================================
# IMPORTANT: One-time repository setup required
# =============================================================================
# For deployments to succeed, GitHub Pages must be configured to use GitHub Actions:
#
#   1. Go to: https://github.com/scull7/crossr-skills/settings/pages
#   2. Under "Build and deployment" → "Source", select **GitHub Actions**
#   3. Save the setting
#
# Without this, the `deploy` job will fail with a 404 when creating the Pages
# deployment (this is the current root cause of failures).
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'book/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Builds the full public site:
    # - mdBook documentation is built first and placed at /docs
    # - Zola marketing site is the root landing page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola (Rust static site generator)
        run: |
          ZOLA_VERSION="0.19.2"
          curl -L "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/
          zola --version

      - name: Install mdBook (Rust documentation generator)
        run: |
          MDBOOK_VERSION="0.4.40"
          curl -L "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv mdbook /usr/local/bin/
          mdbook --version

      - name: Build documentation (mdBook) → site/static/docs
        run: |
          mkdir -p site/static/docs
          echo "=== Book source structure ==="
          find book -type f | head -30
          echo ""
          echo "=== Current SUMMARY.md ==="
          cat book/src/SUMMARY.md
          echo ""
          echo "=== Running mdbook build ==="
          RUST_LOG=info mdbook build book --dest-dir site/static/docs 2>&1 || true
          echo ""
          echo "=== Contents of site/static/docs after build ==="
          find site/static/docs -type f | head -100 || echo "(no files found)"
          echo ""
          echo "=== End of mdbook debug output ==="

      - name: Build marketing site (Zola)
        run: |
          cd site
          zola build --force
          echo "Built combined Zola + mdBook site successfully"

      - name: Verify documentation was built
        run: |
          if [ ! -f "site/public/docs/index.html" ]; then
            echo "❌ ERROR: site/public/docs/index.html does not exist!"
            echo ""
            echo "Contents of site/public/docs/ (if any):"
            ls -la site/public/docs/ 2>/dev/null || echo "(directory missing or empty)"
            echo ""
            echo "This usually means the mdBook build produced no output."
            echo "Check the previous 'Build documentation (mdBook)' step for errors."
            exit 1
          fi
          echo "✅ Documentation successfully built at /docs/"
          echo "   (site/public/docs/index.html exists, size: $(stat -c%s site/public/docs/index.html 2>/dev/null || stat -f%z site/public/docs/index.html) bytes)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

  deploy:
    # Requires the GitHub Pages source to be set to "GitHub Actions"
    # (see the setup instructions at the top of this file).
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
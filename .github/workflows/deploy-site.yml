name: Deploy CrossR Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'book/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Builds both the Zola marketing site and the mdBook documentation.
    # mdBook output is placed at /docs on the final site.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola (Rust static site generator)
        run: |
          ZOLA_VERSION="0.19.2"
          curl -L "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/
          zola --version

      - name: Install mdBook
        run: |
          cargo install mdbook --version 0.4.40 --locked
          mdbook --version

      - name: Build documentation (mdBook) into site
        run: |
          mdbook build book --dest-dir site/static/docs
          echo "Built mdBook documentation"

      - name: Build marketing site (Zola)
        run: |
          cd site
          zola build --force
          echo "Built combined Zola + mdBook site successfully"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4